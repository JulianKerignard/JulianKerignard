name: generate snake

on:
  schedule:
    - cron: "0 3 * * 0"   # every Sunday at 03:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?color_snake=#2dd4bf&color_dots=#161b22,#1f6f66,#20b2a3,#2dd4bf,#5eead4
            dist/github-snake.svg?color_snake=#0d9488&color_dots=#ebedf0,#99e6da,#4fd1c5,#14b8a6,#0d9488

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
